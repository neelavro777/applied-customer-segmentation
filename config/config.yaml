artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  data_path: artifacts/data/raw/Online Retail.csv
  ingested_data_path: artifacts/data_ingestion/customer_data.csv

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/customer_data.csv
  preprocessor_path: artifacts/data_transformation/preprocessor.pkl
  train_data_path: artifacts/data_transformation/train.npy
  test_data_path: artifacts/data_transformation/test.npy
  val_data_path: artifacts/data_transformation/val.npy

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train.npy
  # Per-model artifacts
  kmeans_model_path: artifacts/model_trainer/kmeans_model.pkl
  dbscan_model_path: artifacts/model_trainer/dbscan_model.pkl
  gmm_model_path: artifacts/model_trainer/gmm_model.pkl
  # The "serving" model - a copy of whichever model wins evaluation
  model_path: artifacts/model_trainer/model.pkl
  metadata_path: artifacts/model_trainer/model_metadata.json

model_evaluation:
  root_dir: artifacts/model_evaluation
  model_path: artifacts/model_trainer/model.pkl
  metadata_path: artifacts/model_trainer/model_metadata.json
  test_data_path: artifacts/data_transformation/test.npy
  val_data_path: artifacts/data_transformation/val.npy
  metric_file_name: artifacts/model_evaluation/metrics.json
